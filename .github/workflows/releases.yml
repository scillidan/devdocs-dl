name: Create Releases

on:
  workflow_dispatch:
    inputs:
      convert_markdown:
        description: 'Convert HTML to Markdown'
        required: true
        type: boolean
        default: true
      custom_docs_list:
        description: 'Optional: Custom comma-separated list of docs (overrides DOCS_USER)'
        required: false
        type: string
        default: ''

jobs:
  process-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate date-based tag and release name
        id: generate_tag
        run: |
          CURRENT_DATE=$(date +'%Y%m%d')
          echo "tag_name=$CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "release_name=DevDocs Release $CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "Generated tag: $CURRENT_DATE"
          echo "Generated release name: $CURRENT_DATE"

      - name: Determine DOCS_USER
        id: docs_user
        run: |
          # Priority: manual input > repo variable > default
          if [ -n "${{ github.event.inputs.custom_docs_list }}" ]; then
            echo "Using custom docs list from workflow input"
            echo "DOCS_USER=${{ github.event.inputs.custom_docs_list }}" >> $GITHUB_ENV
          elif [ -n "${{ vars.DOCS_USER }}" ]; then
            echo "Using DOCS_USER from repository variables"
            echo "DOCS_USER=${{ vars.DOCS_USER }}" >> $GITHUB_ENV
          else
            echo "Using default DOCS_USER"
            echo "DOCS_USER=html,css,javascript,http" >> $GITHUB_ENV
          fi
          echo "DOCS_USER: $DOCS_USER"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full tree jq zip

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install html2markdown
        run: go install github.com/JohannesKaufmann/html-to-markdown/v2/cli/html2markdown@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: (devdocs) Get Ruby Version from Gemfile
        id: get_ruby_version
        run: |
          ruby_version=$(curl -s https://raw.githubusercontent.com/freeCodeCamp/devdocs/refs/heads/main/Gemfile | grep -oP "ruby '\K[^']+")
          echo "ruby_version=${ruby_version}" >> $GITHUB_ENV

      - name: (devdocs) Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.ruby_version }}

      - name: (devdocs) Clone and install dependencies
        run: |
          git clone --depth=1 https://github.com/freeCodeCamp/devdocs.git
          cd devdocs
          gem install bundler
          bundle install

      - name: Clean and check disk space
        run: |
          sudo apt-get clean
          sudo apt-get autoremove
          go clean -cache
          df -h

      - name: (devdocs) List available documents
        run: |
          cd devdocs
          bundle exec thor docs:list | tee devdocs-docs-all.txt
          echo ""
          echo "Available documents for download:"
          bundle exec thor docs:list | head -50

      - name: (devdocs) Build documents
        run: |
          cd devdocs
          IFS=',' read -ra DOCS <<< "${{ env.DOCS_USER }}"
          echo "Downloading documents: ${#DOCS[@]} total"
          for doc in "${DOCS[@]}"; do
            echo "Downloading: $doc"
            bundle exec thor docs:download "$doc" || echo "Failed to download $doc, continuing..."
          done
          df -h

      - name: Convert HTML to Markdown
        if: ${{ github.event.inputs.convert_markdown == 'true' }}
        run: |
          cd devdocs
          IFS=',' read -ra DOCS <<< "${{ env.DOCS_USER }}"
          html_dir="public/docs"
          md_dir="public/markdown"
      
          for doc_slug in "${DOCS[@]}"; do
            echo "Converting $doc_slug to Markdown..."
      
            if [ -d "$html_dir/$doc_slug" ]; then
              find "$html_dir/$doc_slug" -name "*.html" 2>/dev/null | while read -r filepath; do
                if [ -f "$filepath" ]; then
                  relpath=${filepath#$html_dir/$doc_slug/}
                  dirname=$(dirname -- "$relpath")
                  mkdir -p "$md_dir/$doc_slug/$dirname"
                  outfile="$md_dir/$doc_slug/$dirname/$(basename -- "${filepath%.html}.md")"
      
                  if command -v html2markdown &> /dev/null; then
                    html2markdown < "$filepath" > "$outfile"
                    echo "Converted: $filepath -> $outfile"
                  else
                    echo "Warning: html2markdown command not found."
                    exit 1
                  fi
                fi
              done
            else
              echo "Directory $html_dir/$doc_slug not found, skipping..."
            fi
          done
      
          echo "Markdown files generated in $md_dir/"
          tree "$md_dir" | head -20 || echo "No markdown files found"

      - name: Create zip archives
        run: |
          cd devdocs
          
          html_dir="public/docs"
          md_dir="public/markdown"

          echo "Creating zip archives..."

          # Create HTML zip
          echo "Creating HTML zip..."
          if [ -d "$html_dir" ] && [ "$(ls -A $html_dir 2>/dev/null)" ]; then
            cd "$html_dir"
            zip -r ../../devdocs-docs-user-html.zip *
            cd ../..
            echo "Created: devdocs-docs-user-html.zip"
            ls -lh devdocs-docs-user-html.zip
          else
            echo "No HTML files to zip"
          fi

          # Create Markdown zip
          if [ "${{ github.event.inputs.convert_markdown }}" = "true" ]; then
            echo "Creating Markdown zip..."
            if [ -d "$md_dir" ] && [ "$(ls -A $md_dir 2>/dev/null)" ]; then
              cd "$md_dir"
              zip -r ../../devdocs-docs-user-md.zip *
              cd ../..
              echo "Created: devdocs-docs-user-md.zip"
              ls -lh devdocs-docs-user-md.zip
            else
              echo "No Markdown files to zip"
            fi
          fi

          echo "All zip files:"
          ls -lh *.zip 2>/dev/null || echo "No zip files created"

      - name: List generated files
        run: |
          cd devdocs
          echo "Generated zip files:"
          ls -lh *.zip 2>/dev/null || echo "No zip files"

          echo "Zip file contents preview:"
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              echo "=== $zipfile ==="
              unzip -l "$zipfile" | head -20
              echo ""
            fi
          done

      - name: Generate SHA256 checksums
        run: |
          for file in ./devdocs-docs-all.txt ./devdocs/devdocs-docs-user-*.zip;
          do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256";
              echo "Generated checksum for $file";
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devdocs-files
          path: |
            devdocs/devdocs-docs-all.txt
            devdocs/devdocs-docs-user-html.zip
            devdocs/devdocs-docs-user-md.zip
          if-no-files-found: warn
          retention-days: 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.generate_tag.outputs.tag_name }}
          name: ${{ steps.generate_tag.outputs.release_name }}
          draft: false
          prerelease: false
          files: |
            devdocs/devdocs-docs-all.txt
            devdocs/devdocs-docs-user-html.zip
            devdocs/devdocs-docs-user-md.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
